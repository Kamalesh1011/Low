# ═══════════════════════════════════════════════════════
# OmniForge Nexus — Render Blueprint
# Deploy: Dashboard → New → Blueprint → Connect this repo
# ═══════════════════════════════════════════════════════

services:
  # ── FastAPI Backend ────────────────────────────────────
  - type: web
    name: omniforge-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore  # Closest to India
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_VERSION
        value: "1.0.0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: VAULT_ENCRYPTION_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: DEFAULT_MODEL
        value: openai/gpt-4o
      - key: PLANNER_MODEL
        value: openai/gpt-4o
      - key: ARCHITECT_MODEL
        value: anthropic/claude-3.5-sonnet
      - key: BUILDER_MODEL
        value: openai/gpt-4o
      - key: VALIDATOR_MODEL
        value: deepseek/deepseek-r1
      - key: DATABASE_URL
        fromDatabase:
          name: omniforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: omniforge-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://omniforge-nexus.vercel.app","https://*.vercel.app","http://localhost:5173"]'
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
    healthCheckPath: /health

  # ── Redis Cache ────────────────────────────────────────
  - type: redis
    name: omniforge-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ── PostgreSQL Database ────────────────────────────────
databases:
  - name: omniforge-db
    plan: free
    region: singapore
    databaseName: omniforge_nexus
    user: omniforge
